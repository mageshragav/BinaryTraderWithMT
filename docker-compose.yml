version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: trading_postgres
    environment:
      POSTGRES_USER: trading_user
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: trading_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Application
  api:
    build: .
    container_name: trading_api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://trading_user:secure_password@postgres:5432/trading_db
      ZMQ_HOST: tcp://0.0.0.0
      ZMQ_PORT: 5555
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LLM_PROVIDER: openai
      LLM_MODEL: gpt-4o-mini
      CHROMA_PERSIST_DIR: /app/chroma_db
      LOG_LEVEL: INFO
    volumes:
      - chroma_data:/app/chroma_db
      - ./app:/app/app
    ports:
      - "8000:8000"
    command: >
      bash -c "aerich upgrade && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped

  # ZeroMQ Bridge (Optional - for MT4 communication)
  zmq_bridge:
    image: python:3.11-slim
    container_name: zmq_bridge
    working_dir: /app
    volumes:
      - .:/app
    command: >
      bash -c "curl -LsSf https://astral.sh/uv/install.sh | sh && source $HOME/.local/bin/env && uv pip install --system pyzmq && python scripts/zmq_router.py"
    ports:
      - "5555:5555"
      - "5556:5556"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  chroma_data:

networks:
  default:
    name: trading_network
